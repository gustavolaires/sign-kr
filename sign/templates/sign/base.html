{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SIGN-KR{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'sign/css/output.css' %}">
</head>
<body class="min-h-screen bg-gray-100 text-gray-900">
    <nav class="bg-indigo-700 text-white shadow">
        <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
            <a href="{% url 'sign:product_list' %}" class="text-lg font-bold tracking-tight">SIGN-KR</a>
            <div class="flex gap-2">
                <a href="{% url 'sign:product_list' %}"
                   class="rounded-md px-3 py-2 text-sm font-medium hover:bg-indigo-600">Produtos</a>
                <a href="{% url 'sign:manufacturer_list' %}"
                   class="rounded-md px-3 py-2 text-sm font-medium hover:bg-indigo-600">Fabricantes</a>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-5xl px-4 py-8">
        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="rounded-lg border px-4 py-3 text-sm
                        {% if message.tags == 'error' %}border-red-300 bg-red-50 text-red-800
                        {% else %}border-green-300 bg-green-50 text-green-800{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
